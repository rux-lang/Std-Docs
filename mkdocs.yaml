site_name: Rux Standard Library
site_description: Official reference documentation for the Rux Standard Library
site_url: https://rux-lang.github.io
repo_name: rux-lang/Std
repo_url: https://github.com/rux-lang/Std
copyright: 'Copyright © 2026 Rux Contributors — Released under the <a href="https://github.com/rux-lang/Rux/blob/main/LICENSE" target="_blank" rel="noopener">MIT License</a>'
strict: false

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  custom_dir: overrides

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  features:
    - navigation.sections
    - navigation.top
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      name: GitHub
      link: https://github.com/rux-lang/Std
    - icon: fontawesome/brands/discord
      name: Discord
      link: https://discord.com/invite/uvSHjtZSVG
    - icon: fontawesome/brands/youtube
      name: YouTube
      link: https://www.youtube.com/@ruxlang
    - icon: fontawesome/brands/x-twitter
      name: X / Twitter
      link: https://x.com/ruxlang
    - icon: fontawesome/brands/mastodon
      name: Mastodon
      link: https://mastodon.social/@ruxlang
    - icon: fontawesome/brands/bluesky
      name: Bluesky
      link: https://bsky.app/profile/rux-lang.dev
    - icon: fontawesome/brands/telegram
      name: Telegram
      link: https://t.me/ruxlang
    - icon: fontawesome/brands/reddit
      name: Reddit
      link: https://www.reddit.com/r/ruxlang

nav:
  - Home: index.md
  - Standard Library:
      - Overview: std/index.md
      - IO:
          - Overview: std/io/index.md
          - Input: std/io/input.md
          - Print: std/io/print.md
      - Memory:
          - Overview: std/memory/memory.md
          - Allocation: std/memory/allocation.md
          - Operations: std/memory/operations.md
      - System:
          - Overview: std/system/index.md
          - Assert: std/system/assert.md
          - Exit: std/system/exit.md
          - Fatal: std/system/fatal.md
      - Text:
          - Overview: std/text/index.md
          - Display: std/text/display.md
          - Format: std/text/format.md
          - String: std/text/string.md
          - StringBuilder: std/text/stringbuilder.md
      - Types:
          - Overview: std/types/index.md
          - Bool: std/types/bool.md
          - Char: std/types/char.md
          - Float: std/types/float.md
          - Int: std/types/int.md
          - UInt: std/types/uint.md
      - Encoding:
          - Overview: std/Encoding/index.md
          - Base64: std/Encoding/Base64.md
          - Hex: std/Encoding/Hex.md
      - UUID:
          - Overview: std/UUID/index.md
          - UUID: std/UUID/UUID.md
      - Collections:
          - Overview: std/Collections/index.md
          - HashMap: std/Collections/HashMap.md
          - HashSet: std/Collections/HashSet.md
      - Sort:
          - Overview: std/Sort/index.md
          - Sort (Auto): std/Sort/Sort.md
          - Quadsort: std/Sort/Quadsort.md
          - Piposort: std/Sort/Piposort.md
          - Crumsort: std/Sort/Crumsort.md
      - Hash:
          - Overview: std/Hash/index.md
          - MD5: std/Hash/Md5.md
          - SHA-0: std/Hash/Sha0.md
          - SHA-1: std/Hash/Sha1.md
          - SHA-256: std/Hash/Sha256.md
          - SHA-512: std/Hash/Sha512.md
          - BLAKE2: std/Hash/Blake2.md
          - BLAKE3: std/Hash/Blake3.md
      - Utilities:
          - Overview: std/utilities/index.md
          - Math: std/utilities/math.md
          - Random: std/utilities/random.md
          - Time: std/utilities/time.md
